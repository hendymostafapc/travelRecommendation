<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TravelBloom</title>
        <link rel="stylesheet" href="travel_recommendation.css">
        <script src="https://kit.fontawesome.com/e31b637892.js" crossorigin="anonymous"></script>
    </head>
    <body>
      <header>
        <a href="travel_recommendation.html"><h1>TRAVEL BLOOM</h1></a>
        <nav>
            <ul>
                <li><a href="travel_recommendation.html">Home</a></li>
                <li><a href="about-us.html">About Us</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
      </header>
      <main class="contact">
        <aside>
            <a href=""><i class="fa-brands fa-square-facebook" ></i></a>
            <a href=""><i class="fa-brands fa-square-twitter" ></i></a>
            <a href=""><i class="fa-brands fa-instagram" ></i></a>
            <a href=""><i class="fa-brands fa-youtube" ></a></i>
        </aside>
        <article  class="contact">
            <h2>CONTACT US</h2>
            <p>Get in touch</p>
        </article>
        <form action="">
            <fieldset>
                <label for="name">Name</label>
                <input type="text" name="name" id="name">
            </fieldset>
            <fieldset>
                <label for="email">E-mail</label>
                <input type="text" name="email" id="email">
            </fieldset>
            <fieldset>
                <label for="message">Message</label>
                <textarea name="message" id="message" cols="30" rows="10"></textarea>
            </fieldset>
            
            <button type="submit">Submit</button>
        </form> 
        
      </main> 
      
</body>
